name: Deploy to K3s

on:
  push:
    branches: [main]
    paths:
      - "deploy/**"
      - "www/**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/crypterio
  NAMESPACE: default

concurrency:
  group: deploy-k3s
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # 🔒 enable approval in GitHub UI

    steps:
    # 📥 Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 Docker login
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🐳 Build & Push
    - name: Build and Push Image
      run: |
        IMAGE_TAG=${{ github.sha }}

        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        docker push $IMAGE_NAME:$IMAGE_TAG

        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest

    # ☸️ Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    # 🔍 Verify cluster
    - name: Check cluster
      run: kubectl get nodes

    # 📦 Apply manifests (ONLY infra, no image logic)
    - name: Apply base manifests
      run: |
        kubectl apply -n $NAMESPACE -f deploy/deployment.yaml

    # 🚀 Deploy image
    - name: Deploy new version
      run: |
        IMAGE_TAG=${{ github.sha }}

        kubectl set image deployment/crypterio \
          crypterio=${IMAGE_NAME}:${IMAGE_TAG} \
          -n $NAMESPACE

    # ⏳ Wait rollout
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/crypterio -n $NAMESPACE

    # ❗ Debug on failure
    - name: Debug on failure
      if: failure()
      run: |
        kubectl get pods -n $NAMESPACE
        kubectl describe deployment crypterio -n $NAMESPACE
        
