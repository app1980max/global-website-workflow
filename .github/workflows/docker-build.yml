name: Deploy to K3s

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/crypterio

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🏗️ Build & Push Docker image
    - name: Build and Push Image
      run: |
        IMAGE_TAG=${{ github.sha }}

        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        docker push $IMAGE_NAME:$IMAGE_TAG

        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest

   
    # ⚙️ Setup kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

    # 🔍 Verify cluster connection
    - name: Check cluster
      run: |
        kubectl get nodes

    # 🚀 Apply Kubernetes manifests
    - name: Apply Kubernetes Manifests
      run: |
        IMAGE_TAG=${{ github.sha }}
        sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_NAME}:${IMAGE_TAG}|g" deploy/deployment.yaml.yaml
        kubectl apply -f deploy/deployment.yaml.yaml
        kubectl rollout status deployment/crypterio
