name: Deploy to K3s

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/crypterio
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🏗️ Build & Push image
    - name: Build and Push
      run: |
        IMAGE_TAG=${{ github.sha }}

        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        docker push $IMAGE_NAME:$IMAGE_TAG

        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest

    # ⚙️ Setup kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

    # 🚀 Deploy to K3s
    - name: Deploy
      run: |
        IMAGE_TAG=${{ github.sha }}

        kubectl set image deployment/crypterio \
          my-app=$IMAGE_NAME:$IMAGE_TAG --record

        kubectl rollout status deployment/crypterio
