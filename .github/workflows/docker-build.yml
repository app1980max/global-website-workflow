name: Deploy to K3s

on:
  push:
    branches:
      - main
    paths:
      - "deploy/**"
      - "www/**"
  pull_request:
    branches:
      - main
    paths:
      - "deploy/**"
      - "www/**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/crypterio

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🏗️ Build & Push Docker image
    - name: Build and Push Image
      run: |
        IMAGE_TAG=${{ github.sha }}

        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        docker push $IMAGE_NAME:$IMAGE_TAG

        docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest

    # ✅ Kubernetes steps MUST be here
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
        
    # ⚙️ Setup kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          
    # 🔍 Verify cluster connection
    - name: Check cluster
      run: |
        kubectl get nodes

    # 🚀 Apply Kubernetes manifests
    - name: Apply Kubernetes Manifests
      run: |
        kubectl apply -f deploy/deployment.yaml
        
    # 🔥 Better than sed: use kubectl set image
    - name: Deploy new version
      run: |
        IMAGE_TAG=${{ github.sha }}
        kubectl set image deployment/crypterio \
          crypterio=${IMAGE_NAME}:${IMAGE_TAG}

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/crypterio

    # 🩺 Health check (optional but recommended)
    - name: Health check
      run: |
        sleep 10
        kubectl get pods
          
    
