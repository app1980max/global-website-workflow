<VirtualHost *:80>
  ServerName crypterio.co
  ServerAlias www.crypterio.co
  DocumentRoot /var/www/crypterio
  DirectoryIndex index.php
  <Directory /var/www/crypterio/>
      Options Indexes FollowSymLinks MultiViews
      AllowOverride All
      Order deny,allow
      Allow from all
  </Directory>

  ErrorLog ${APACHE_LOG_DIR}/error.log
  CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>

